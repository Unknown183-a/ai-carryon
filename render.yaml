services:
  - type: web
    name: ai-carryon
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    disk:
      name: aicarryon-data
      mountPath: /opt/render/project/src/output
      sizeGB: 1

  - type: worker
    name: worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python scheduler.py
    disk:
      name: aicarryon-data
      mountPath: /opt/render/project/src/output
      sizeGB: 1
